<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyYield | Twój Terminal Giełdowy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f121d;
            color: #dcdce6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        header {
            background-color: #141928;
            width: 100%;
            padding: 40px 0;
            border-bottom: 1px solid #1a2035;
        }
        h1 {
            color: #00ffa3;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #788296;
            font-size: 0.9rem;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .container {
            max-width: 800px;
            padding: 60px 20px;
        }
        .hero-text {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .highlight {
            color: #00d1ff;
            font-weight: bold;
        }
        .cta-button {
            background-color: #00ffa3;
            color: #0f121d;
            padding: 20px 40px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2rem;
            transition: transform 0.2s;
            display: inline-block;
        }
        .cta-button:hover {
            transform: scale(1.05);
            background-color: #00e692;
        }
        .preview-img {
            width: 100%;
            max-width: 400px;
            border: 1px solid #1a2035;
            border-radius: 10px;
            margin-top: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 60px;
            text-align: left;
        }
        .feature-item {
            background: #141928;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #00d1ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>COPYYIELD</h1>
        <div class="subtitle">Personalny Raport Giełdowy AI</div>
    </header>

    <div class="container">
        <div class="hero-text">
            Zdominuj otwarcie sesji. <span class="highlight">Odbieraj raport o 8:00</span> bezpośrednio na swoją skrzynkę e-mail.
        </div>
        
        <a href="#" class="cta-button">WYPRÓBUJ 3 DNI ZA DARMO</a>

        <div class="features">
            <div class="feature-item">
                <strong>Punktualność</strong><br>Analiza gotowa zawsze przed dzwonkiem na GPW.
            </div>
            <div class="feature-item">
                <strong>Sentyment AI</strong><br>Interpretacja tysięcy newsów w 2 minuty czytania.
            </div>
        </div>

        <img src="CopyYield_Report.pdf" alt="Podgląd Raportu" class="preview-img">
    </div>
</body>
</html>
